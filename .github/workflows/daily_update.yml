name: Daily ETF Data Update & Multi-Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 7 * * *' # 매일 오후 4시 (KST)
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update data
        run: node update_data.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git commit -m "chore: daily data update [$(date +'%Y-%m-%d')]" || echo "No changes to commit"
          git push origin main

      - name: Deploy to GitHub Pages (momojjung.github.io)
        run: |
          git remote add deploy https://x-access-token:${{ secrets.GH_PAT }}@github.com/momojjung/momojjung.github.io.git || git remote set-url deploy https://x-access-token:${{ secrets.GH_PAT }}@github.com/momojjung/momojjung.github.io.git
          git push deploy main --force

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_ETF_PROJECT_93BED }}'
          channelId: live
          projectId: my-etf-project-93bed
